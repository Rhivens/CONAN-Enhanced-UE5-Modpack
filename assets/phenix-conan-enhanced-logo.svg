<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Phénix Conan Enhanced — Blood &amp; Sand Edition</title>
  <desc id="desc">Logo stylisé du modpack Phénix Conan Enhanced — Blood &amp; Sand Edition, avec phénix, acier, sang et sable.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#4b240d"/>
      <stop offset="45%" stop-color="#170b08"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#7a4b17"/>
      <stop offset="30%" stop-color="#f1c36b"/>
      <stop offset="55%" stop-color="#fff0b5"/>
      <stop offset="80%" stop-color="#b97a25"/>
      <stop offset="100%" stop-color="#5b3410"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" x2="1">
      <stop offset="0%" stop-color="#7b0904"/>
      <stop offset="35%" stop-color="#e43b13"/>
      <stop offset="70%" stop-color="#ff9b1f"/>
      <stop offset="100%" stop-color="#ffe08a"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1">
      <stop offset="0%" stop-color="#1d1d1f"/>
      <stop offset="35%" stop-color="#8b8b86"/>
      <stop offset="55%" stop-color="#e3d5b6"/>
      <stop offset="100%" stop-color="#28282b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.75"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="600" cy="260" r="210" fill="#d99841" opacity="0.18"/>
  <circle cx="600" cy="260" r="172" fill="none" stroke="url(#gold)" stroke-width="12" opacity="0.8"/>
  <circle cx="600" cy="260" r="190" fill="none" stroke="#25150d" stroke-width="28" opacity="0.85"/>
  <circle cx="600" cy="260" r="204" fill="none" stroke="url(#gold)" stroke-width="6"/>

  <!-- Desert dunes -->
  <path d="M160 380 C300 300 430 370 545 320 C680 260 820 315 1040 255 L1040 430 L160 430 Z" fill="#9a6328" opacity="0.32"/>
  <path d="M150 420 C300 360 460 410 590 365 C750 315 900 380 1050 335 L1050 460 L150 460 Z" fill="#d28b3e" opacity="0.22"/>

  <!-- Crossed blades -->
  <g filter="url(#shadow)" opacity="0.95">
    <g transform="translate(600 365) rotate(-28)">
      <rect x="-510" y="-18" width="520" height="36" rx="6" fill="url(#steel)"/>
      <polygon points="10,-18 115,0 10,18" fill="url(#steel)"/>
      <rect x="-560" y="-28" width="70" height="56" rx="10" fill="#3b2114" stroke="url(#gold)" stroke-width="5"/>
    </g>
    <g transform="translate(600 365) rotate(28)">
      <rect x="-10" y="-18" width="520" height="36" rx="6" fill="url(#steel)"/>
      <polygon points="510,-18 615,0 510,18" fill="url(#steel)"/>
      <rect x="490" y="-28" width="70" height="56" rx="10" fill="#3b2114" stroke="url(#gold)" stroke-width="5"/>
    </g>
  </g>

  <!-- Phoenix wings -->
  <g filter="url(#glow)">
    <path d="M600 280 C510 210 390 175 245 160 C365 220 445 268 510 336 C420 300 330 285 215 310 C360 360 475 365 560 410 Z" fill="url(#fire)" opacity="0.95"/>
    <path d="M600 280 C690 210 810 175 955 160 C835 220 755 268 690 336 C780 300 870 285 985 310 C840 360 725 365 640 410 Z" fill="url(#fire)" opacity="0.95"/>
    <path d="M600 118 C640 180 650 245 615 330 C664 270 708 230 760 206 C690 310 660 382 600 440 C540 382 510 310 440 206 C492 230 536 270 585 330 C550 245 560 180 600 118 Z" fill="url(#fire)"/>
    <circle cx="600" cy="175" r="34" fill="#ff8c1a"/>
    <path d="M630 166 L700 145 L640 192 Z" fill="#ffd36c"/>
    <circle cx="614" cy="165" r="5" fill="#fff1a8"/>
  </g>

  <!-- Shield -->
  <g filter="url(#shadow)">
    <circle cx="600" cy="390" r="110" fill="#151516" stroke="url(#gold)" stroke-width="12"/>
    <circle cx="600" cy="390" r="86" fill="#292726" stroke="#5c3a18" stroke-width="4"/>
    <path d="M600 318 C640 355 653 410 628 456 C615 480 585 480 572 456 C547 410 560 355 600 318 Z" fill="#9d0d08" opacity="0.9"/>
    <path d="M600 345 C570 365 550 392 540 430 C575 405 593 397 600 360 C607 397 625 405 660 430 C650 392 630 365 600 345 Z" fill="#e33a13"/>
  </g>

  <!-- Title plaques -->
  <g filter="url(#shadow)">
    <path d="M130 450 L1070 450 L1015 555 L185 555 Z" fill="#160b0a" stroke="url(#gold)" stroke-width="7"/>
    <path d="M95 502 L180 445 L175 560 Z" fill="#4e0706" stroke="#8f4d1a" stroke-width="4"/>
    <path d="M1105 502 L1020 445 L1025 560 Z" fill="#4e0706" stroke="#8f4d1a" stroke-width="4"/>
    <text x="600" y="527" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="116" font-weight="900" letter-spacing="6" fill="url(#gold)" stroke="#2b1606" stroke-width="3">PHÉNIX</text>
  </g>

  <text x="600" y="595" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" letter-spacing="5" fill="#e9d8b2" stroke="#000" stroke-width="2">CONAN ENHANCED</text>
  <path d="M330 612 L870 612 L825 660 L375 660 Z" fill="#320b08" stroke="url(#gold)" stroke-width="4"/>
  <text x="600" y="646" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="31" font-weight="700" letter-spacing="3" fill="#f2c66e">BLOOD &amp; SAND EDITION</text>

  <!-- Blood drops -->
  <path d="M275 555 C278 590 260 600 262 630 C245 605 250 580 245 555 Z" fill="#6d0303" opacity="0.9"/>
  <path d="M935 555 C932 590 950 600 948 630 C965 605 960 580 965 555 Z" fill="#6d0303" opacity="0.9"/>
</svg>
